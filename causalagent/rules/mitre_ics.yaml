# CausalAgent :: MITRE ATT&CK for ICS — Technique Scoring Rules
# ================================================================
# Indicator weights for each ICS technique.
# Used by MitreICSClassifier.classify(events).
#
# Indicator schema:
#   tag:        OT tag name (optional — use tag OR protocol)
#   protocol:   OT protocol name (optional)
#   condition:  present | value_deviation_pct | severity_crit |
#               high_event_rate | cross_zone_protocol
#   threshold:  numeric threshold for condition (where applicable)
#   weight:     contribution to technique confidence (0.0 – 1.0, sum to 1.0)
#
# Reference: https://attack.mitre.org/matrices/ics/

T0836:
  name: "Modify Parameter"
  tactic: "Impair Process Control"
  indicators:
    - tag: FCV-R2
      condition: value_deviation_pct
      threshold: 30
      weight: 0.40
    - protocol: DNP3
      condition: present
      weight: 0.20
    - tag: EW-04
      condition: present
      weight: 0.25
    - tag: FCV-R2
      condition: severity_crit
      weight: 0.15

